name: 🐛 Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much detail as you can — it really helps.

  - type: input
    id: module
    attributes:
      label: Module
      description: Which Coral module is affected?
      placeholder: e.g. Aurora, KAPOW!, @get-coral/jellyfin
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: input
    id: jellyfin
    attributes:
      label: Jellyfin version
      placeholder: e.g. 10.9.0

  - type: input
    id: docker
    attributes:
      label: Docker / NAS setup
      placeholder: e.g. Synology DSM 7, Docker 24.0

  - type: input
    id: package_version
    attributes:
      label: Package version
      placeholder: e.g. @get-coral/jellyfin@0.1.0

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      render: shell
