name: 💡 Feature Request
description: Propose a new feature or improvement to an existing module
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, check if there's already an open issue or discussion for it.

  - type: input
    id: module
    attributes:
      label: Module
      description: Which module does this relate to?
      placeholder: e.g. Aurora, KAPOW!, @get-coral/jellyfin, or "new module idea"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or pain point this feature addresses.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see built?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
